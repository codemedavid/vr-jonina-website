    <!-- Magenta-pink liquid fill -->
    <path d="M-26,0 Q-28,28 -20,37 Q-14,43 0,43 Q14,43 20,37 Q28,28 26,0 Z" fill="#FF69B4" opacity="0.35"/>
    <rect x="-20" y="-25" width="40" height="26" rx="4" fill="#FFF0F5" stroke="#FF69B4" stroke-width="1"/>
    <line x1="-14" y1="-14" x2="14" y2="-14" stroke="#FF69B4" stroke-width="1"/>
    <line x1="-14" y1="-5" x2="10" y2="-5" stroke="#FF69B4" stroke-width="1"/>
    <!-- Sparkle dots -->
    <circle cx="-15" cy="15" r="2" fill="white" opacity="0.7"/>
    <circle cx="10" cy="20" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="-5" cy="25" r="1" fill="white" opacity="0.5"/>
