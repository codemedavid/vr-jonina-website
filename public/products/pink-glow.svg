<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF0F5"/>
      <stop offset="100%" stop-color="#FF85A2"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF69B4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="150" cy="150" r="140" fill="url(#bg)" stroke="#D4568A" stroke-width="2"/>
  <!-- Ribbon Bow - more magenta -->
  <g transform="translate(150,38)">
    <ellipse cx="-18" cy="0" rx="18" ry="10" fill="#FF69B4" opacity="0.9"/>
    <ellipse cx="18" cy="0" rx="18" ry="10" fill="#FF69B4" opacity="0.9"/>
    <circle cx="0" cy="0" r="5" fill="#D4568A"/>
    <path d="M-8,10 Q0,28 8,10" fill="#FF69B4" opacity="0.8"/>
    <path d="M-6,10 Q0,24 6,10" fill="#D4568A" opacity="0.5"/>
  </g>
  <!-- Glow effect behind bottle -->
  <circle cx="150" cy="148" r="50" fill="url(#glow)"/>
  <!-- Elegant Bottle with pink/magenta accent -->
  <g transform="translate(150,152)">
    <rect x="-8" y="-65" width="16" height="22" rx="4" fill="white" stroke="#D4568A" stroke-width="1.5"/>
    <rect x="-12" y="-78" width="24" height="15" rx="5" fill="#D4568A"/>
    <rect x="-10" y="-80" width="20" height="4" rx="2" fill="#C2185B"/>
