<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF0F5"/>
      <stop offset="100%" stop-color="#FFB6C8" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#FFB6C8"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0E8F8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#B8D8F0" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4568A"/>
      <stop offset="100%" stop-color="#E8739B"/>
    </linearGradient>
  </defs>
  <circle cx="150" cy="150" r="140" fill="url(#bg)"/>
  <!-- Taller bottle shape -->
  <rect x="115" y="90" width="70" height="140" rx="10" fill="url(#bottle)" stroke="#D4568A" stroke-width="2"/>
  <!-- Water fill inside -->
  <rect x="119" y="150" width="62" height="76" rx="8" fill="url(#water)"/>
  <!-- Bottle neck -->
  <rect x="135" y="68" width="30" height="28" rx="4" fill="#E8F4FD" stroke="#D4568A" stroke-width="2"/>
  <!-- Cap -->
  <rect x="130" y="58" width="40" height="16" rx="5" fill="url(#cap)"/>
  <!-- Label -->
  <rect x="122" y="115" width="56" height="50" rx="6" fill="white" fill-opacity="0.85"/>
  <text x="150" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#4A3040">BAC Water</text>
  <text x="150" y="157" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#D4568A">10ml</text>
  <!-- Ribbon bow -->
  <ellipse cx="140" cy="62" rx="15" ry="8" fill="#FF85A2" opacity="0.85"/>
  <ellipse cx="160" cy="62" rx="15" ry="8" fill="#FF85A2" opacity="0.85"/>
  <circle cx="150" cy="62" r="4" fill="#D4568A"/>
  <path d="M143 66 L135 80 L141 76" fill="#FF85A2" opacity="0.7"/>
  <path d="M157 66 L165 80 L159 76" fill="#FF85A2" opacity="0.7"/>
  <!-- Hearts -->
  <g fill="#E8739B" opacity="0.5">
    <path d="M60 80 C60 75,67 75,67 80 C67 85,60 90,60 90 C60 90,53 85,53 80 C53 75,60 75,60 80Z" transform="scale(0.55) translate(60,48)"/>
    <path d="M60 80 C60 75,67 75,67 80 C67 85,60 90,60 90 C60 90,53 85,53 80 C53 75,60 75,60 80Z" transform="scale(0.5) translate(420,82)"/>
    <path d="M60 80 C60 75,67 75,67 80 C67 85,60 90,60 90 C60 90,53 85,53 80 C53 75,60 75,60 80Z" transform="scale(0.45) translate(100,438)"/>
    <path d="M60 80 C60 75,67 75,67 80 C67 85,60 90,60 90 C60 90,53 85,53 80 C53 75,60 75,60 80Z" transform="scale(0.4) translate(480,448)"/>
  </g>
  <circle cx="82" cy="110" r="2" fill="#FFB6C8"/>
  <circle cx="222" cy="98" r="2.5" fill="#E8739B" opacity="0.6"/>
  <circle cx="90" cy="215" r="1.5" fill="#FF85A2" opacity="0.5"/>
  <circle cx="215" cy="222" r="2" fill="#FFB6C8" opacity="0.7"/>
  <text x="150" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#4A3040">BAC Water 10ml</text>
